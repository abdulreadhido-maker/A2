<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المختبر التفاعلي | جرب قبل الشراء</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* تنسيقات سريعة خاصة بالمختبر لضمان الهوية البصرية */
        .lab-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .control-panel {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .preview-panel {
            background: #23272e;
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }
        .btn-buy {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>المختبر التفاعلي 🧪</h1>
        <p>قم بتخصيص المكونات البرمجية وشاهد النتيجة حية قبل اتخاذ قرار الشراء!</p>
    </header>

    <main class="lab-container">
        <section class="control-panel">
            <h3>لوحة التحكم</h3>
            <label for="theme-color">اختر اللون الأساسي للقالب:</label>
            <input type="color" id="theme-color" value="#007bff">
            
            <br><br>
            
            <label for="text-input">نص الزر التفاعلي:</label>
            <input type="text" id="text-input" value="اضغط هنا">

            <br><br>

            <button class="btn-buy" onclick="window.location.href='checkout.html'">شراء هذا القالب الآن وتلقي الكود كاملاً 🚀</button>
        </section>

        <section class="preview-panel" id="preview-area">
            <button id="demo-button" style="background-color: #007bff; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer;">
                اضغط هنا
            </button>
        </section>
    </main>

    <script src="js/lab.js"></script>
</body>
</html>
